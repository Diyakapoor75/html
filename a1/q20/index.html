<!DOCTYPE html>
<html>

<head>
    <title> Form </title>
</head>

<body>
    <form>
        <label for="first name"> first name </label>
        <input type="text" id="first name" name="username" /> <br />

        <label for="last name">last name</label>
        <input type="text" id="last name" name="lastname" /> <br />

        <label for="email"> email id</label>
        <input type="text" id="email" name="emailid" /> <br />

        <label for="contact no"> contact no </label>
        <input type="text" id="contact no" name="contact no" maxlength="10" minlength="10" /> <br />

        <label for="gender"> gender</label>

        <label for="female"> female </label>
        <input type="radio" id="female" name="female"> <br />


        <label for="male"> male </label>
        <input type="radio" id="male" name="male"> <br />


        <label for="address"> address </label>
        <input type="text" id="address" name="address" /> <br />

        <label for="pincode"> pincode</label>
        <input type="text" id="pincode" name="pincode" minlength="6" maxlength="6" /> <br />

       <label for="country"> country </label>
        <input type="textarea" placeholder="country" id="country" name="country" /> <br />
 


        <button> submit </button>

    </form>
</body>

</html>
